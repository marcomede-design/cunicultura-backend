<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistema de Cunicultura PRO</title>

<style>
body{
font-family: Arial;
max-width:1000px;
margin:40px auto;
}
.card{
background:#f5f5f5;
padding:15px;
margin:10px 0;
border-radius:10px;
}
h1,h2{
text-align:center;
}
input, select, button{
width:100%;
padding:10px;
margin:5px 0;
}
button{
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
}
.excluir{
background:red;
}
.alerta{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<h1>🐇 Sistema de Cunicultura PRO</h1>

<h2>📊 Dashboard</h2>
<div class="card" id="dashboard"></div>

<h2>🐰 Cadastro de Animal</h2>

<input id="brinco" placeholder="Brinco">
<select id="sexo">
<option value="M">Macho</option>
<option value="F">Fêmea</option>
</select>
<input id="raca" placeholder="Raça">
<input type="date" id="nascimento">

<select id="status">
<option value="ativo">Ativo</option>
<option value="vendido">Vendido</option>
<option value="abate">Abate</option>
</select>

<button onclick="salvar()">Salvar</button>

<h2>📋 Animais</h2>
<div class="card" id="listaAnimais"></div>

<h2>💞 Cobertura</h2>

<select id="matrizCobertura"></select>
<select id="machoCobertura"></select>
<input type="date" id="dataCobertura">

<button onclick="registrarCobertura()">Registrar Cobertura</button>

<h2>📅 Coberturas Ativas</h2>
<div class="card" id="listaCoberturas"></div>

<h2>🐣 Parto</h2>

<select id="matrizSelect"></select>
<input type="date" id="dataParto">
<input id="nascidos" placeholder="Nascidos">
<input id="mortos" placeholder="Mortos">

<button onclick="registrarParto()">Registrar Parto</button>

<h2>📊 Histórico por Matriz</h2>

<select id="matrizHistorico"></select>
<button onclick="verHistorico()">Ver Histórico</button>

<div class="card" id="historico"></div>

<script>

// ================= DASHBOARD =================
async function carregarDashboard(){
  const res = await fetch("/dashboard")
  if(!res.ok) return
  const d = await res.json()

  dashboard.innerHTML = `
    Total: ${d.totalAnimais} |
    Ninhadas: ${d.totalNinhadas} |
    Nascidos: ${d.totalNascidos} |
    Mortalidade: ${d.taxaMortalidade}%
  `
}

// ================= ANIMAIS =================
async function carregarAnimais(){
  const res = await fetch("/animais")
  const animais = await res.json()

  matrizSelect.innerHTML=""
  matrizCobertura.innerHTML=""
  machoCobertura.innerHTML=""
  matrizHistorico.innerHTML=""

  let html=""

  animais.forEach(a=>{

    html += `
    <div>
      <b>${a.brinco}</b> - ${a.sexo} - ${a.raca}
      <button class="excluir" onclick="excluirAnimal(${a.id})">Excluir</button>
    </div>
    `

    if(a.sexo==="F"){
      matrizSelect.innerHTML += `<option value="${a.id}">${a.brinco}</option>`
      matrizCobertura.innerHTML += `<option value="${a.id}">${a.brinco}</option>`
      matrizHistorico.innerHTML += `<option value="${a.id}">${a.brinco}</option>`
    }

    if(a.sexo==="M"){
      machoCobertura.innerHTML += `<option value="${a.id}">${a.brinco}</option>`
    }

  })

  listaAnimais.innerHTML = html
}

// ================= EXCLUIR =================
async function excluirAnimal(id){
  if(!confirm("Excluir?")) return

  const res = await fetch(`/animais/${id}`, {method:"DELETE"})
  const data = await res.json()

  if(!res.ok){
    alert(data.erro)
    return
  }

  carregarTudo()
}

// ================= SALVAR =================
async function salvar(){

  if(!brinco.value || !nascimento.value){
    alert("Preencha os campos obrigatórios")
    return
  }

  const animal = {
    brinco: brinco.value,
    sexo: sexo.value,
    raca: raca.value,
    nascimento: nascimento.value,
    status: status.value
  }

  const res = await fetch("/animais",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(animal)
  })

  if(!res.ok){
    alert("Erro ao salvar")
    return
  }

  brinco.value=""
  raca.value=""
  nascimento.value=""

  carregarTudo()
}

// ================= COBERTURA =================
async function registrarCobertura(){

  if(!dataCobertura.value){
    alert("Informe a data")
    return
  }

  const res = await fetch("/coberturas",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      matrizId: matrizCobertura.value,
      machoId: machoCobertura.value,
      dataCobertura: dataCobertura.value
    })
  })

  const data = await res.json()

  if(!res.ok){
    alert(data.erro)
    return
  }

  dataCobertura.value=""
  carregarTudo()
}

// ================= COBERTURAS =================
async function carregarCoberturas(){
  const res = await fetch("/coberturas")
  const cob = await res.json()

  let html=""

  cob.forEach(c=>{
    const hoje = new Date()
    const parto = new Date(c.previsaoParto)
    const dias = Math.ceil((parto - hoje)/(1000*60*60*24))

    let alerta = ""
    if(dias <= 3) alerta = "<span class='alerta'>⚠ Próximo do parto</span>"

    html += `
    <div>
      Matriz: ${c.matriz.brinco} |
      Macho: ${c.macho.brinco} |
      Parto: ${parto.toLocaleDateString()} 
      ${alerta}
    </div>
    `
  })

  listaCoberturas.innerHTML = html
}

// ================= PARTO =================
async function registrarParto(){

  if(!dataParto.value){
    alert("Informe a data")
    return
  }

  const res = await fetch("/ninhadas",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      matrizId: matrizSelect.value,
      dataParto: dataParto.value,
      nascidos: nascidos.value || 0,
      mortos: mortos.value || 0
    })
  })

  if(!res.ok){
    alert("Erro")
    return
  }

  dataParto.value=""
  nascidos.value=""
  mortos.value=""

  carregarTudo()
}

// ================= HISTÓRICO =================
async function verHistorico(){

  const matrizId = matrizHistorico.value

  if(!matrizId){
    alert("Selecione uma matriz")
    return
  }

  const res = await fetch(`/matriz/${matrizId}/historico`)
  const data = await res.json()

  if(!res.ok){
    alert(data.erro)
    return
  }

  let html = `<h3>Matriz: ${data.matriz.brinco}</h3>`

  html += "<b>📅 Coberturas:</b><br>"

  if(data.coberturas.length === 0){
    html += "Nenhuma cobertura registrada<br>"
  } else {
    data.coberturas.forEach(c=>{
      html += `
        ${new Date(c.dataCobertura).toLocaleDateString()} |
        Macho: ${c.macho?.brinco || "-"}<br>
      `
    })
  }

  html += "<br><b>🐣 Ninhadas:</b><br>"

  if(data.ninhadas.length === 0){
    html += "Nenhum parto registrado<br>"
  } else {
    data.ninhadas.forEach(n=>{
      html += `
        ${new Date(n.dataParto).toLocaleDateString()} |
        Nascidos: ${n.nascidos} |
        Mortos: ${n.mortos}<br>
      `
    })
  }

  historico.innerHTML = html
}

// ================= GLOBAL =================
async function carregarTudo(){
  await carregarDashboard()
  await carregarAnimais()
  await carregarCoberturas()
}

carregarTudo()

</script>

</body>
</html>
